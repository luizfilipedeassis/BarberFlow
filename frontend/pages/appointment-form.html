<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Novo agendamento | BarberFlow</title>
  <link rel="icon" href="../assets/logo.svg" type="image/svg+xml">
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <a class="brand" href="dashboard.html"><span class="brand-mark">BF</span><span>BarberFlow</span></a>
      <nav class="sidebar-nav" aria-label="Navegação principal">
        <a class="nav-link" data-page="dashboard" href="dashboard.html">Visão geral</a>
        <a class="nav-link" data-page="clients" href="clients.html">Clientes</a>
        <span class="nav-link active">Novo agendamento</span>
      </nav>
      <button class="btn btn-secondary logout-btn" data-logout><span>Sair</span> →</button>
    </aside>

    <main class="main-content">
      <header class="topbar">
        <div class="page-title">
          <h1>Novo agendamento</h1>
          <p>Reserve um horário para o cliente.</p>
        </div>
      </header>

      <section class="panel">
        <form id="appointmentForm">
          <div class="form-grid">
            <div class="form-group full">
              <label for="clientId">Cliente *</label>
              <select id="clientId" name="clientId" required>
                <option value="">Carregando clientes...</option>
              </select>
              <span class="form-hint">O cliente deve ser cadastrado antes do agendamento.</span>
            </div>

            <div class="form-group">
              <label for="service">Serviço *</label>
              <select id="service" name="service" required>
                <option value="">Selecione</option>
                <option>Corte tradicional</option>
                <option>Barba</option>
                <option>Corte + barba</option>
                <option>Acabamento</option>
              </select>
            </div>

            <div class="form-group">
              <label for="status">Status *</label>
              <select id="status" name="status" required>
                <option>Agendado</option>
                <option>Concluído</option>
                <option>Cancelado</option>
              </select>
            </div>

            <div class="form-group">
              <label for="date">Data *</label>
              <input id="date" name="date" type="date" required>
            </div>

            <div class="form-group">
              <label for="time">Horário *</label>
              <input id="time" name="time" type="time" min="08:00" max="20:00" step="1800" required>
              <span class="form-hint">Atendimento entre 08:00 e 20:00.</span>
            </div>

            <div class="form-group full">
              <label for="notes">Observações</label>
              <textarea id="notes" name="notes" maxlength="300" placeholder="Preferências ou informações importantes..."></textarea>
            </div>
          </div>

          <div class="form-actions">
            <a class="btn btn-secondary" href="dashboard.html">Cancelar</a>
            <button class="btn btn-primary" type="submit" id="saveButton">Salvar agendamento</button>
          </div>
        </form>
      </section>
    </main>
  </div>

  <script src="../js/common.js"></script>
  <script src="../js/appointment-form.js"></script>
</body>
</html>
